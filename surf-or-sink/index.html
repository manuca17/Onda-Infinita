<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Surf or Sink</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a2a4a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }
        canvas {
            display: block;
            image-rendering: pixelated;
        }
    </style>
</head>
<body>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <!--
        Carrega os scripts do jogo com cache-busting (?v=timestamp) para garantir
        que o browser usa sempre a versão mais recente durante o desenvolvimento.
        Em produção podes substituir Date.now() por um número de versão fixo.
    -->
    <script>
        (function () {
            var v = Date.now();
            var files = [
                'src/scenes/BootScene.js',
                'src/scenes/PreloadScene.js',
                'src/scenes/MenuScene.js',
                'src/scenes/GameScene.js',
                'src/scenes/GameOverScene.js',
                'src/main.js'
            ];
            files.forEach(function (f) {
                document.write('<script src="' + f + '?v=' + v + '"><\/script>');
            });
        })();
    </script>
</body>
</html>
